version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: vehicle_insurance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: gunicorn vehicle_insurance.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0

  celery:
    build: .
    command: celery -A vehicle_insurance worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - web
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0

  celery-beat:
    build: .
    command: celery -A vehicle_insurance beat -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - web
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: