# render.yaml
services:
  - type: web
    name: vehicle-insure
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn vehicle_insurance_backend.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vehicle_insurance_backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,vehicleinsure.ng,www.vehicleinsure.ng"